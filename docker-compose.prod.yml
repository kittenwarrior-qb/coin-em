version: '3.8'

services:
  backend:
    build:
      context: ./be
      dockerfile: Dockerfile.prod
    container_name: emcoin-backend-prod
    expose:
      - "3001"
    volumes:
      - backend-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001
      - CLIENT_ORIGIN=https://quocbui.site
    networks:
      - emcoin-network
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./fe
      dockerfile: Dockerfile.prod
      args:
        - VITE_API_URL=https://quocbui.site
    container_name: emcoin-frontend-prod
    volumes:
      - fe-dist:/var/www/html
    networks:
      - emcoin-network

  caddy:
    image: caddy:2-alpine
    container_name: emcoin-caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - fe-dist:/var/www/html:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - emcoin-network
    depends_on:
      - backend
      - frontend
    restart: always

networks:
  emcoin-network:
    driver: bridge

volumes:
  backend-data:
  fe-dist:
  caddy-data:
  caddy-config:
