name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [develop]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: be/package-lock.json

      - name: Install backend deps
        run: npm ci
        working-directory: be

      - name: Backend lint
        run: npm run lint --if-present
        working-directory: be

      - name: Backend tests
        run: npm test
        working-directory: be

      - name: Install frontend deps
        run: npm ci
        working-directory: fe

      - name: Frontend lint
        run: npm run lint
        working-directory: fe

      - name: Frontend tests
        run: npm test --if-present
        working-directory: fe

      - name: Frontend build check
        run: npm run build
        working-directory: fe

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: |
          npm ci
          working-directory: be
          npm ci
          working-directory: fe
          npm ci
          working-directory: e2e

      - name: Install Playwright
        run: npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Start backend
        run: |
          npm run dev &
          timeout 30 bash -c 'until curl -sf http://localhost:3001/health; do sleep 2; done'
        working-directory: be
        env:
          NODE_ENV: test
          PORT: 3001
          CLIENT_ORIGIN: http://localhost:5173

      - name: Start frontend
        run: |
          npm run dev &
          timeout 30 bash -c 'until curl -sf http://localhost:5173; do sleep 2; done'
        working-directory: fe
        env:
          VITE_API_URL: http://localhost:3001

      - name: Run E2E
        run: npx playwright test
        working-directory: e2e
        env:
          BASE_URL: http://localhost:5173

      - name: Upload report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 3
